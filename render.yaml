services:
  - type: web
    name: ny-tagging-sys
    env: python
    plan: free
    region: singapore
    buildCommand: pip install -r backend_v2/requirements.txt
    startCommand: cd backend_v2 && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8001
      - key: DATABASE_URL
        value: sqlite:///database.db
      - key: TZ
        value: Asia/Ho_Chi_Minh
    autoDeploy: true
